<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEA Universiapolis | Site Officiel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22; 
            --light: #f8f9fa;
        }
        body { background-color: var(--light); min-height: 100vh; display: flex; flex-direction: column; scroll-behavior: smooth; }
        
        .nav-active { border-bottom: 3px solid var(--accent); color: var(--accent) !important; }
        
        .interactive-card {
            transition: all 0.3s ease;
            text-align: center;
        }
        .interactive-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .btn-contact {
            background-color: #25D366; /* Vert WhatsApp */
            color: white;
            border-radius: 9999px;
            transition: transform 0.3s;
        }
        .btn-contact:hover { transform: scale(1.05); background-color: #128C7E; }

        .media-placeholder {
            width: 100%;
            height: 220px;
            background: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            color: white;
        }
    </style>
</head>
<body>

    <nav class="bg-[#1a252f] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-20">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="navigate('accueil')">
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center overflow-hidden border-2 border-[#e67e22]">
                    <i class="fas fa-globe-africa text-[#2c3e50] text-2xl"></i>
                </div>
                <div>
                    <span class="font-bold text-xl block leading-none">UEA</span>
                    <span class="text-[10px] text-[#e67e22] uppercase tracking-[0.2em]">Universiapolis</span>
                </div>
            </div>
            
            <div class="hidden md:flex space-x-6 font-semibold uppercase text-sm">
                <button onclick="navigate('accueil')" id="nav-accueil" class="hover:text-[#e67e22] transition py-2">Accueil</button>
                <button onclick="navigate('bureau')" id="nav-bureau" class="hover:text-[#e67e22] transition py-2">Le Bureau</button>
                <button onclick="navigate('activites')" id="nav-activites" class="hover:text-[#e67e22] transition py-2">Activités</button>
                <button onclick="navigate('about')" id="nav-about" class="hover:text-[#e67e22] transition py-2">About & Contact</button>
            </div>
        </div>
    </nav>

    <main id="content-area" class="flex-grow"></main>

    <footer class="bg-[#1a252f] text-white py-12 text-center border-t border-gray-800">
        <div class="flex justify-center space-x-8 mb-6">
            <a href="https://www.instagram.com/ueauniversiapolis" target="_blank" class="text-3xl text-white hover:text-[#e67e22] transition">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://wa.me/212781688850" target="_blank" class="text-3xl text-white hover:text-[#25D366] transition">
                <i class="fab fa-whatsapp"></i>
            </a>
        </div>
        <p class="text-gray-500 text-sm italic">"Unir les talents, célébrer les cultures"</p>
        <p class="text-gray-600 mt-4 text-xs uppercase tracking-widest">&copy; 2026 UEA Universiapolis Agadir</p>
    </footer>

    <script>
        const whatsappLink = "https://wa.me/212781688850?text=Bonjour%20UEA%20Universiapolis,%20je%20souhaite%20avoir%20des%20informations.";

        const pages = {
            accueil: `
                <section class="relative h-[80vh] flex items-center justify-center text-center text-white">
                    <div class="absolute inset-0 bg-black">
                        <img src="https://images.unsplash.com/photo-1523580494863-6f3031224c94?auto=format&fit=crop&w=1350&q=80" class="w-full h-full object-cover opacity-40">
                    </div>
                    <div class="relative z-10 px-6">
                        <h1 class="text-6xl font-black mb-6 tracking-tight">UNION DES ÉTUDIANTS <br><span class="text-[#e67e22]">AFRICAINS</span></h1>
                        <p class="text-xl max-w-2xl mx-auto font-light leading-relaxed">Promouvoir la culture africaine et l’unité des étudiants d'Universiapolis Agadir à travers la solidarité et l'excellence.</p>
                        <div class="mt-10 flex justify-center space-x-4">
                            <button onclick="navigate('activites')" class="bg-[#e67e22] px-8 py-4 rounded-xl font-bold hover:scale-105 transition shadow-lg">Voir nos Activités</button>
                            <a href="${whatsappLink}" target="_blank" class="bg-white text-black px-8 py-4 rounded-xl font-bold hover:bg-gray-100 transition shadow-lg flex items-center">
                                <i class="fab fa-whatsapp mr-2 text-green-500"></i> Nous rejoindre
                            </a>
                        </div>
                    </div>
                </section>
                <section class="py-20 bg-white">
                    <div class="max-w-4xl mx-auto px-6 text-center">
                        <h2 class="text-3xl font-bold mb-6 text-[#1a252f]">Notre Mission</h2>
                        <p class="text-gray-600 text-lg leading-relaxed">Nous créons des liens solides entre les étudiants tout en célébrant la diversité et l’enrichissement mutuel au sein de l'université Universiapolis Agadir.</p>
                    </div>
                </section>
            `,
            bureau: `
                <section class="py-20 px-6 max-w-7xl mx-auto">
                    <div class="text-center mb-16">
                        <h2 class="text-4xl font-black uppercase text-[#1a252f]">Le Bureau Exécutif</h2>
                        <div class="h-1 w-20 bg-[#e67e22] mx-auto mt-4"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                        ${renderMember("Président", "Gilles IMMONGAULT", "Master1 Logistique")}
                        ${renderMember("Vice-Présidente", "Chahd MECHINO", "2ème année Ingénierie")}
                        ${renderMember("Secrétaire Général", "Coulibaly IBRAHIM", "2ème année Ingénierie")}
                        ${renderMember("Porte Parole", "Dylane NGOMO", "3ème année Génie Alimentaire")}
                        ${renderMember("Resp. Informatique", "Abdul Karim M.", "4ème année Génie Info")}
                        ${renderMember("Resp. Communication", "Judes Paul MAYOMBO", "4ème année Génie Civil")}
                        ${renderMember("Trésorier", "Yacine OUEDRAOGO", "4ème année Génie Civil")}
                        ${renderMember("Responsable Sportif", "N'fally KONE", "3ème année Finance")}
                        ${renderMember("Resp. Événementiel", "Dimitri DIPAMA", "4ème année Génie Info")}
                    </div>
                </section>
            `,
            activites: `
                <section class="py-20 px-6 max-w-7xl mx-auto">
                    <h2 class="text-4xl font-black text-center mb-16 uppercase">Activités Réalisées</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                        <div class="bg-white rounded-2xl overflow-hidden shadow-xl">
                            <div class="media-placeholder"><i class="fas fa-video fa-4x opacity-20"></i></div>
                            <div class="p-8">
                                <span class="text-[#e67e22] font-bold text-sm">MARS - AVRIL 2025</span>
                                <h3 class="text-2xl font-bold mt-2">All Star Game</h3>
                                <p class="text-gray-600 mt-4">Tournoi de football rassemblant 10 équipes et 120 joueurs des 5 écoles. Champion : Infinite FC.</p>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl overflow-hidden shadow-xl border-4 border-[#e67e22]">
                            <div class="media-placeholder bg-[#e67e22] text-white flex-col">
                                <i class="fas fa-star fa-4x mb-4"></i>
                                <span class="font-black text-2xl uppercase tracking-widest">À Venir</span>
                            </div>
                            <div class="p-8">
                                <span class="text-gray-400 font-bold text-sm">JUIN 2026</span>
                                <h3 class="text-2xl font-bold mt-2">UNI CULTURE</h3>
                                <p class="text-gray-600 mt-4">Une journée de rassemblement autour de la culture, des traditions et du terroir de chaque communauté.</p>
                            </div>
                        </div>
                    </div>
                </section>
            `,
            about: `
                <section class="py-20 px-6 max-w-5xl mx-auto">
                    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
                        <div class="bg-[#1a252f] text-white p-12 md:w-1/3 flex flex-col justify-center">
                            <h2 class="text-3xl font-bold mb-6">Contact</h2>
                            <div class="space-y-6">
                                <a href="https://wa.me/212781688850" class="flex items-center hover:text-[#e67e22] transition text-lg">
                                    <i class="fab fa-whatsapp mr-4 text-2xl"></i> +212 781 688 850
                                </a>
                                <a href="mailto:ueauniversiapolis@gmail.com" class="flex items-center hover:text-[#e67e22] transition text-lg">
                                    <i class="fas fa-envelope mr-4 text-2xl"></i> uea@gmail.com
                                </a>
                                <a href="https://www.instagram.com/ueauniversiapolis" target="_blank" class="flex items-center hover:text-[#e67e22] transition text-lg">
                                    <i class="fab fa-instagram mr-4 text-2xl"></i> Instagram
                                </a>
                            </div>
                        </div>
                        <div class="p-12 md:w-2/3">
                            <h2 class="text-3xl font-bold mb-6 text-[#1a252f]">Pourquoi nous rejoindre ?</h2>
                            <p class="text-gray-600 text-lg leading-relaxed mb-6">Faire partie d’une communauté soudée et dynamique, participer à la valorisation de la culture africaine et développer des relations enrichissantes avec des étudiants de toutes nationalités.</p>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-gray-50 p-4 rounded-xl text-center"><h4 class="font-bold text-[#e67e22]">320+</h4><p class="text-xs uppercase font-bold">Étudiants</p></div>
                                <div class="bg-gray-50 p-4 rounded-xl text-center"><h4 class="font-bold text-[#e67e22]">10+</h4><p class="text-xs uppercase font-bold">Nationalités</p></div>
                            </div>
                        </div>
                    </div>
                </section>
            `
        };

        function renderMember(role, name, school) {
            return `
                <div class="bg-white shadow-lg rounded-2xl p-8 interactive-card border-b-4 border-gray-100">
                    <img src="https://via.placeholder.com/150" alt="${name}" class="mx-auto rounded-full mb-6 w-32 h-32 object-cover border-4 border-white shadow-md">
                    <h3 class="font-bold text-xl text-[#1a252f]">${role}</h3>
                    <p class="text-gray-500 font-medium">${name}</p>
                    <p class="text-[10px] text-[#e67e22] font-black uppercase mt-2 tracking-widest">${school}</p>
                    <div class="mt-6">
                        <a href="${whatsappLink}" target="_blank" class="btn-contact inline-flex items-center px-6 py-3 text-xs font-bold uppercase tracking-widest">
                            <i class="fab fa-whatsapp mr-2 text-base"></i> Contacter
                        </a>
                    </div>
                </div>
            `;
        }

        function navigate(pageId) {
            document.getElementById('content-area').innerHTML = pages[pageId];
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('nav-active'));
            const activeBtn = document.getElementById('nav-' + pageId);
            if(activeBtn) activeBtn.classList.add('nav-active');
            window.scrollTo(0, 0);
        }

        window.onload = () => navigate('accueil');
    </script>
</body>
</html>
