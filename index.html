<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEA Universiapolis | Officiel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --uea-rose: #f472b6; 
            --uea-rose-light: #fbcfe8;
            --uea-black: #000000;
        }
        body { background-color: var(--uea-black); color: white; font-family: 'Inter', sans-serif; }
        
        /* Style des boutons et éléments actifs */
        .nav-active { color: var(--uea-rose) !important; border-bottom: 3px solid var(--uea-rose); }
        .pink-gradient { background: linear-gradient(135deg, #f472b6 0%, #db2777 100%); }
        .text-pink { color: var(--uea-rose); }

        /* Cartes Activités */
        .activity-container {
            transition: all 0.4s ease;
            border: 2px solid #333;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
        }
        .activity-container:hover {
            border-color: var(--uea-rose);
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(244, 114, 182, 0.3);
        }

        /* Système de Page de Détails (Modale) */
        #detail-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--uea-black); z-index: 9999; overflow-y: auto;
        }
        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 10000;
            background: var(--uea-rose); color: white; padding: 12px 24px;
            border-radius: 50px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="bg-black border-b border-pink-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-20">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="navigate('accueil')">
                <img src="1000537935.png" class="w-12 h-12 rounded-full border-2 border-pink-400">
                <span class="text-2xl font-black tracking-tighter uppercase italic">UEA <span class="text-pink">UNI</span></span>
            </div>
            <div class="hidden md:flex space-x-8 text-xs font-bold uppercase tracking-widest">
                <button onclick="navigate('accueil')" id="nav-accueil" class="hover:text-pink-400">Accueil</button>
                <button onclick="navigate('bureau')" id="nav-bureau" class="hover:text-pink-400">Le Bureau</button>
                <button onclick="navigate('activites')" id="nav-activites" class="hover:text-pink-400">Activités</button>
                <button onclick="navigate('about')" id="nav-about" class="hover:text-pink-400">Contact</button>
            </div>
        </div>
    </nav>

    <div id="detail-view">
        <div onclick="closeDetails()" class="back-btn"><i class="fas fa-arrow-left mr-2"></i> RETOUR</div>
        <div class="max-w-4xl mx-auto py-20 px-6 text-center">
            <img id="det-img" src="" class="w-full rounded-3xl border-4 border-pink-500 shadow-2xl mb-10">
            <h2 id="det-title" class="text-5xl font-black uppercase italic mb-6"></h2>
            <p id="det-desc" class="text-xl text-gray-300 leading-relaxed italic"></p>
        </div>
    </div>

    <main id="main-content"></main>

    <footer class="py-10 text-center border-t border-pink-900 mt-20">
        <img src="1000537935.png" class="w-16 mx-auto mb-4 grayscale hover:grayscale-0 transition">
        <p class="text-gray-500 text-[10px] tracking-[0.4em] uppercase">© 2026 UEA Universiapolis Agadir</p>
    </footer>

    <script>
        const activities = {
            halloween: {
                title: "Movie Night Halloween",
                img: "1000959451.jpg",
                desc: "Une soirée terrifiante à la salle culturelle. 20DH l'entrée pour une ambiance unique, des films d'horreur et une communauté soudée."
            },
            stargame: {
                title: "All Star Game",
                img: "1000959452.jpg",
                desc: "Le tournoi de football officiel de l'UEA. Du 10 Mars au 17 Avril. L'excellence sportive au cœur de notre université."
            }
        };

        const pages = {
            accueil: `
                <div class="py-32 px-6 text-center">
                    <div class="w-40 h-40 mx-auto mb-10 pink-gradient rounded-full p-1 flex items-center justify-center">
                        <img src="1000537935.png" class="w-full h-full rounded-full bg-white">
                    </div>
                    <h1 class="text-6xl md:text-8xl font-black uppercase tracking-tighter italic leading-none">L'AVENIR EN <br><span class="text-pink">CONFIANCE</span></h1>
                    <p class="mt-8 text-gray-400 max-w-xl mx-auto text-lg">L'Union des Étudiants Africains d'Universiapolis Agadir. Culture, Unité, Succès.</p>
                    <button onclick="navigate('activites')" class="mt-12 pink-gradient px-12 py-4 rounded-full font-black uppercase tracking-widest hover:scale-110 transition">Découvrir les Activités</button>
                </div>`,

            activites: `
                <div class="max-w-6xl mx-auto py-20 px-6">
                    <h2 class="text-5xl font-black italic uppercase mb-16 border-l-8 border-pink-500 pl-6">Réalisations</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                        <div class="activity-container" onclick="showDetails('halloween')">
                            <img src="1000959451.jpg" class="w-full h-[500px] object-cover">
                            <div class="p-6 bg-black text-center">
                                <h3 class="text-2xl font-bold uppercase italic">Movie Night Halloween</h3>
                                <p class="text-pink text-xs font-black mt-2">CLIQUER POUR LES DÉTAILS</p>
                            </div>
                        </div>
                        <div class="activity-container" onclick="showDetails('stargame')">
                            <img src="1000959452.jpg" class="w-full h-[500px] object-cover">
                            <div class="p-6 bg-black text-center">
                                <h3 class="text-2xl font-bold uppercase italic">All Star Game</h3>
                                <p class="text-pink text-xs font-black mt-2">CLIQUER POUR LES DÉTAILS</p>
                            </div>
                        </div>
                    </div>
                </div>`,

            bureau: `
                <div class="max-w-7xl mx-auto py-20 px-6 text-center">
                    <h2 class="text-5xl font-black italic uppercase mb-16">Le Bureau <span class="text-pink">Exécutif</span></h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        ${member("Président", "Gilles IMMONGAULT", "Master Logistique")}
                        ${member("Vice-Présidente", "Chahd MECHINO", "2ème année Ingénierie")}
                        ${member("Secrétaire Général", "Coulibaly IBRAHIM", "2ème année Ingénierie")}
                        ${member("Porte Parole", "Dylane NGOMO", "3ème année Génie Alimentaire")}
                        ${member("Resp. Informatique", "Abdul Karim M.", "4ème année Génie Info")}
                        ${member("Resp. Communication", "Judes Paul MAYOMBO", "4ème année Génie Civil")}
                        ${member("Trésorier", "Yacine OUEDRAOGO", "4ème année Génie Civil")}
                        ${member("Responsable Sportif", "N'fally KONE", "3ème année Finance")}
                        ${member("Resp. Événementiel", "Dimitri DIPAMA", "4ème année Génie Info")}
                    </div>
                </div>`,

            about: `
                <div class="max-w-4xl mx-auto py-20 px-6 text-center">
                    <h2 class="text-5xl font-black italic uppercase mb-10">Contact</h2>
                    <div class="bg-zinc-900 p-10 rounded-3xl border border-pink-500">
                        <p class="text-2xl mb-6 font-bold">ueauniversiapolis@gmail.com</p>
                        <div class="flex justify-center space-x-6 text-4xl">
                            <a href="https://wa.me/212781688850" class="text-green-500"><i class="fab fa-whatsapp"></i></a>
                            <a href="https://www.instagram.com/ueauniversiapolis" class="text-pink"><i class="fab fa-instagram"></i></a>
                        </div>
                    </div>
                </div>`
        };

        function member(role, name, details) {
            return `<div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 hover:border-pink-500 transition">
                <div class="w-24 h-24 bg-zinc-800 rounded-full mx-auto mb-4 border-2 border-pink-500 flex items-center justify-center text-gray-500"><i class="fas fa-user text-3xl"></i></div>
                <h4 class="font-black text-xl uppercase tracking-tighter italic text-pink">${role}</h4>
                <p class="text-white font-bold">${name}</p>
                <p class="text-xs text-gray-500 uppercase mt-2">${details}</p>
            </div>`;
        }

        function navigate(id) {
            document.getElementById('main-content').innerHTML = pages[id];
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('nav-active');
            window.scrollTo(0,0);
        }

        function showDetails(id) {
            const data = activities[id];
            document.getElementById('det-img').src = data.img;
            document.getElementById('det-title').innerText = data.title;
            document.getElementById('det-desc').innerText = data.desc;
            document.getElementById('detail-view').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeDetails() {
            document.getElementById('detail-view').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = () => navigate('accueil');
    </script>
</body>
</html>
